name: Deploy Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: godaddy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint project
        run: npm run lint

      - name: Build production site
        run: npm run build

      - name: Prepare GoDaddy deploy package
        run: bash scripts/prepare-deploy.sh

      - name: Skip deploy until GoDaddy secrets are configured
        if: ${{ secrets.GODADDY_FTP_HOST == '' || secrets.GODADDY_FTP_USERNAME == '' || secrets.GODADDY_FTP_PASSWORD == '' }}
        run: |
          echo "::warning::GoDaddy FTP secrets are not configured yet. Build completed, deploy skipped."

      - name: Upload build to GoDaddy
        if: ${{ secrets.GODADDY_FTP_HOST != '' && secrets.GODADDY_FTP_USERNAME != '' && secrets.GODADDY_FTP_PASSWORD != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.GODADDY_FTP_HOST }}
          username: ${{ secrets.GODADDY_FTP_USERNAME }}
          password: ${{ secrets.GODADDY_FTP_PASSWORD }}
          port: ${{ vars.GODADDY_FTP_PORT || 21 }}
          protocol: ${{ vars.GODADDY_FTP_PROTOCOL || 'ftps' }}
          security: ${{ vars.GODADDY_FTP_SECURITY || 'strict' }}
          local-dir: ./.deploy/
          server-dir: ${{ vars.GODADDY_REMOTE_DIR || 'public_html/' }}
          state-name: .godaddy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/._*
